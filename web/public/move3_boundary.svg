<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="1200" height="920" fill="#fdfdfd"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">Move 3: The System Boundary</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#555">Interface Seam Finder / what the code actually does</text>

  <!-- ========== DIVIDING LINE ========== -->
  <line x1="560" y1="72" x2="560" y2="900" stroke="#111" stroke-width="3" stroke-dasharray="10,6"/>

  <!-- Region Labels -->
  <rect x="30" y="76" width="500" height="38" rx="4" fill="#e8f5e9"/>
  <text x="280" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">DETERMINISTIC</text>
  <text x="280" y="130" text-anchor="middle" font-size="11" fill="#2e7d32">Fixed, rule-based, decides pedagogical state</text>

  <rect x="590" y="76" width="580" height="38" rx="4" fill="#e3f2fd"/>
  <text x="880" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">PROBABILISTIC</text>
  <text x="880" y="130" text-anchor="middle" font-size="11" fill="#1565c0">LLM / model, reads and phrases language only</text>

  <!-- ========== DETERMINISTIC COMPONENTS (left) ========== -->

  <!-- Answer Key -->
  <rect x="50" y="155" width="220" height="56" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <text x="160" y="177" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">Hardcoded Answer Key</text>
  <text x="160" y="195" text-anchor="middle" font-size="10" fill="#333">src/answerKey.ts : ANSWER_KEY</text>

  <!-- SOLO Ladder -->
  <rect x="290" y="155" width="240" height="56" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <text x="410" y="177" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">SOLO Ladder + Rungs</text>
  <text x="410" y="195" text-anchor="middle" font-size="10" fill="#333">SOLO_LADDER, CRITERION_LADDER</text>

  <!-- State Machine -->
  <rect x="80" y="260" width="400" height="72" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="280" y="282" text-anchor="middle" font-weight="bold" font-size="14" fill="#1b5e20">State Machine (engine.ts)</text>
  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#333">computeSeam | applyVerifier | nextAction | recordClose</text>
  <text x="280" y="316" text-anchor="middle" font-size="10" fill="#555">deriveHighestRung | advanceSeam | setRungStatus</text>

  <!-- Transition Logic + Hard Cap -->
  <rect x="120" y="365" width="320" height="52" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <text x="280" y="387" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">Transition Logic + Hard Turn Cap</text>
  <text x="280" y="403" text-anchor="middle" font-size="10" fill="#333">probeAttempts >= 2 --> stop_unresolved (engine.ts:122)</text>

  <!-- Supabase Schema -->
  <rect x="50" y="450" width="230" height="72" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <text x="165" y="472" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">Supabase Schema</text>
  <text x="165" y="490" text-anchor="middle" font-size="10" fill="#333">sessions | turns | gaps | closes</text>
  <text x="165" y="506" text-anchor="middle" font-size="10" fill="#555">closes.gap_id --> gaps.id (FK)</text>

  <!-- RLS Policies -->
  <rect x="300" y="450" width="230" height="72" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
  <text x="415" y="472" text-anchor="middle" font-weight="bold" font-size="12" fill="#1b5e20">Row-Level Security</text>
  <text x="415" y="490" text-anchor="middle" font-size="10" fill="#333">user_id = auth.uid() on sessions</text>
  <text x="415" y="506" text-anchor="middle" font-size="10" fill="#555">2-hop join for closes, audio bucket</text>

  <!-- Forbidden Words -->
  <rect x="120" y="555" width="320" height="44" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="280" y="575" text-anchor="middle" font-weight="bold" font-size="11" fill="#1b5e20">Forbidden Words per Rung</text>
  <text x="280" y="590" text-anchor="middle" font-size="10" fill="#333">FORBIDDEN_WORDS : Record&lt;Criterion, string[]&gt;</text>

  <!-- Session types -->
  <rect x="120" y="620" width="320" height="44" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="280" y="640" text-anchor="middle" font-weight="bold" font-size="11" fill="#1b5e20">Types (types.ts)</text>
  <text x="280" y="655" text-anchor="middle" font-size="10" fill="#333">Session | Action | CloseVerdict | VerifierResult</text>


  <!-- ========== PROBABILISTIC COMPONENTS (right) ========== -->

  <!-- Whisper Transcription -->
  <rect x="620" y="155" width="260" height="56" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <text x="750" y="177" text-anchor="middle" font-weight="bold" font-size="12" fill="#0d47a1">Groq whisper-large-v3</text>
  <text x="750" y="195" text-anchor="middle" font-size="10" fill="#333">groqTranscribe() / transcribe/index.ts</text>

  <!-- Verifier -->
  <rect x="620" y="260" width="260" height="72" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <text x="750" y="282" text-anchor="middle" font-weight="bold" font-size="12" fill="#0d47a1">Verifier (5 atomic calls)</text>
  <text x="750" y="300" text-anchor="middle" font-size="10" fill="#333">gpt-oss-120b, temperature 0</text>
  <text x="750" y="316" text-anchor="middle" font-size="10" fill="#555">verify/index.ts, one call per criterion</text>

  <!-- Close-Judge (CIRCLED) -->
  <ellipse cx="750" cy="430" rx="148" ry="52" fill="#fff3e0" stroke="#e65100" stroke-width="3"/>
  <text x="750" y="420" text-anchor="middle" font-weight="bold" font-size="13" fill="#bf360c">Close-Judge</text>
  <text x="750" y="438" text-anchor="middle" font-size="10" fill="#333">gpt-oss-120b, temperature 0</text>
  <text x="750" y="454" text-anchor="middle" font-size="10" fill="#555">close-judge/index.ts</text>

  <!-- Close-Judge Callout -->
  <rect x="910" y="370" width="270" height="120" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="2"/>
  <text x="1045" y="392" text-anchor="middle" font-weight="bold" font-size="11" fill="#e65100">THIS IS THE SECOND-DERIVATION</text>
  <text x="1045" y="408" text-anchor="middle" font-weight="bold" font-size="11" fill="#e65100">JUDGMENT POINT</text>
  <line x1="910" y1="416" x2="1180" y2="416" stroke="#f57f17" stroke-width="1"/>
  <text x="920" y="432" font-size="10" fill="#333">Probabilistic reader, but chained</text>
  <text x="920" y="446" font-size="10" fill="#333">to the deterministic answer key.</text>
  <text x="920" y="462" font-size="10" fill="#333">Its verdict (real_close / fake_close)</text>
  <text x="920" y="476" font-size="10" fill="#333">is fed back into the deterministic</text>
  <text x="920" y="490" font-size="10" fill="#e65100" font-weight="bold">state machine via recordClose().</text>
  <!-- Arrow from callout to circle -->
  <line x1="910" y1="430" x2="900" y2="430" stroke="#f57f17" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Questioner -->
  <rect x="620" y="530" width="260" height="64" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <text x="750" y="552" text-anchor="middle" font-weight="bold" font-size="12" fill="#0d47a1">Questioner</text>
  <text x="750" y="570" text-anchor="middle" font-size="10" fill="#333">gpt-oss-120b, temperature 0.4</text>
  <text x="750" y="586" text-anchor="middle" font-size="10" fill="#555">question/index.ts (no answer key)</text>


  <!-- ========== DATA FLOW ARROWS ========== -->
  <defs>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f57f17"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- ========== FLOW DIAGRAM (bottom section) ========== -->
  <text x="600" y="710" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Data Flow (actual call sequence)</text>

  <!-- Flow nodes -->
  <!-- 1. Audio (learner) -->
  <rect x="32" y="740" width="80" height="34" rx="5" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="72" y="762" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Audio</text>

  <!-- 2. Transcription (prob) -->
  <rect x="148" y="740" width="108" height="34" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="202" y="762" text-anchor="middle" font-size="11" fill="#0d47a1">Transcribe</text>

  <!-- 3. Verifier (prob) -->
  <rect x="290" y="740" width="90" height="34" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="335" y="762" text-anchor="middle" font-size="11" fill="#0d47a1">Verifier</text>

  <!-- 4. computeSeam (det) -->
  <rect x="416" y="740" width="112" height="34" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="472" y="762" text-anchor="middle" font-size="11" fill="#1b5e20">computeSeam</text>

  <!-- 5. nextAction (det) -->
  <rect x="564" y="740" width="96" height="34" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="612" y="762" text-anchor="middle" font-size="11" fill="#1b5e20">nextAction</text>

  <!-- 6. Questioner (prob) -->
  <rect x="696" y="740" width="100" height="34" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="746" y="762" text-anchor="middle" font-size="11" fill="#0d47a1">Questioner</text>

  <!-- Arrows row 1 -->
  <line x1="112" y1="757" x2="145" y2="757" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="256" y1="757" x2="287" y2="757" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="380" y1="757" x2="413" y2="757" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="528" y1="757" x2="561" y2="757" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="660" y1="757" x2="693" y2="757" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Row 2: Learner Answer -> Close-Judge -> recordClose -->
  <!-- 7. Learner Answer -->
  <rect x="32" y="820" width="118" height="34" rx="5" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="91" y="842" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Learner Answer</text>

  <!-- Arrow from Questioner down to Learner Answer -->
  <polyline points="746,774 746,800 160,800 91,800 91,817" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- 8. Close-Judge (circled in row) -->
  <ellipse cx="270" cy="837" rx="62" ry="20" fill="#fff3e0" stroke="#e65100" stroke-width="2.5"/>
  <text x="270" y="842" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">Close-Judge</text>

  <!-- 9. recordClose (det) -->
  <rect x="376" y="820" width="112" height="34" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="432" y="842" text-anchor="middle" font-size="11" fill="#1b5e20">recordClose</text>

  <!-- Arrows row 2 -->
  <line x1="150" y1="837" x2="205" y2="837" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="334" y1="837" x2="373" y2="837" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Loop arrow from recordClose back up to nextAction -->
  <polyline points="488,837 520,837 520,800 612,800 612,777" fill="none" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="555" y="795" font-size="9" fill="#2e7d32" font-weight="bold">loop</text>

  <!-- Legend -->
  <rect x="820" y="740" width="16" height="12" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="844" y="751" font-size="10" fill="#333">= deterministic</text>
  <rect x="820" y="762" width="16" height="12" rx="2" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="844" y="773" font-size="10" fill="#333">= probabilistic</text>
  <ellipse cx="828" cy="794" rx="8" ry="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="844" y="798" font-size="10" fill="#333">= judgment point</text>
  <line x1="820" y1="816" x2="836" y2="816" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="844" y="820" font-size="10" fill="#333">= feedback loop</text>

  <!-- Vertical boundary label -->
  <text x="562" y="695" text-anchor="middle" font-size="10" fill="#666" transform="rotate(-90,562,695)">BOUNDARY</text>

</svg>
