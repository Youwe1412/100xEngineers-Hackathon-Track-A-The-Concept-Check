<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820" font-family="'Courier New', Courier, monospace">

  <!-- Background -->
  <rect width="900" height="820" fill="#FAFAF7"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- TABLE: auth.users  (x=340, y=20)           -->
  <!-- ─────────────────────────────────────────── -->
  <g id="auth-users">
    <!-- header -->
    <rect x="340" y="20" width="220" height="34" rx="4" fill="#1e2a32"/>
    <text x="450" y="42" text-anchor="middle" fill="white" font-size="14" font-weight="bold">auth.users</text>
    <!-- body -->
    <rect x="340" y="54" width="220" height="30" rx="0" fill="white" stroke="#1e2a32" stroke-width="1.5"/>
    <rect x="340" y="54" width="220" height="30" fill="none" stroke="#1e2a32" stroke-width="1.5" rx="0"/>
    <text x="355" y="74" fill="#1e2a32" font-size="12">id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#c0392b" font-weight="bold">PK</tspan></text>
    <!-- outer border -->
    <rect x="340" y="20" width="220" height="64" rx="4" fill="none" stroke="#1e2a32" stroke-width="2"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- TABLE: sessions  (x=280, y=150)            -->
  <!-- ─────────────────────────────────────────── -->
  <g id="sessions">
    <rect x="280" y="150" width="340" height="34" rx="4" fill="#1e2a32"/>
    <text x="450" y="172" text-anchor="middle" fill="white" font-size="14" font-weight="bold">sessions</text>
    <!-- rows -->
    <rect x="280" y="184" width="340" height="156" fill="white" stroke="#1e2a32" stroke-width="1.5" rx="0"/>
    <!-- dividers -->
    <line x1="280" y1="210" x2="620" y2="210" stroke="#ddd" stroke-width="1"/>
    <line x1="280" y1="236" x2="620" y2="236" stroke="#ddd" stroke-width="1"/>
    <line x1="280" y1="262" x2="620" y2="262" stroke="#ddd" stroke-width="1"/>
    <line x1="280" y1="288" x2="620" y2="288" stroke="#ddd" stroke-width="1"/>
    <line x1="280" y1="314" x2="620" y2="314" stroke="#ddd" stroke-width="1"/>
    <!-- content -->
    <text x="296" y="202" fill="#1e2a32" font-size="12">id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#c0392b" font-weight="bold">PK</tspan></text>
    <text x="296" y="228" fill="#1e2a32" font-size="12">user_id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#2980b9" font-weight="bold">FK → auth.users</tspan></text>
    <text x="296" y="254" fill="#1e2a32" font-size="12">highest_rung_reached  <tspan fill="#888">(text)</tspan></text>
    <text x="296" y="280" fill="#1e2a32" font-size="12">is_complete  <tspan fill="#888">(boolean)</tspan></text>
    <text x="296" y="306" fill="#1e2a32" font-size="12">state  <tspan fill="#888">(jsonb)</tspan>  <tspan fill="#7d6b4f" font-size="11">← engine snapshot</tspan></text>
    <text x="296" y="332" fill="#1e2a32" font-size="12">created_at  <tspan fill="#888">(timestamptz)</tspan></text>
    <!-- outer border -->
    <rect x="280" y="150" width="340" height="190" rx="4" fill="none" stroke="#1e2a32" stroke-width="2"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- TABLE: turns  (x=50, y=420)               -->
  <!-- ─────────────────────────────────────────── -->
  <g id="turns">
    <rect x="50" y="420" width="310" height="34" rx="4" fill="#1e2a32"/>
    <text x="205" y="442" text-anchor="middle" fill="white" font-size="14" font-weight="bold">turns</text>
    <!-- rows -->
    <rect x="50" y="454" width="310" height="182" fill="white" stroke="#1e2a32" stroke-width="1.5"/>
    <line x1="50" y1="480" x2="360" y2="480" stroke="#ddd" stroke-width="1"/>
    <line x1="50" y1="506" x2="360" y2="506" stroke="#ddd" stroke-width="1"/>
    <line x1="50" y1="532" x2="360" y2="532" stroke="#ddd" stroke-width="1"/>
    <line x1="50" y1="558" x2="360" y2="558" stroke="#ddd" stroke-width="1"/>
    <line x1="50" y1="584" x2="360" y2="584" stroke="#ddd" stroke-width="1"/>
    <line x1="50" y1="610" x2="360" y2="610" stroke="#ddd" stroke-width="1"/>
    <!-- content -->
    <text x="66" y="472" fill="#1e2a32" font-size="12">id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#c0392b" font-weight="bold">PK</tspan></text>
    <text x="66" y="498" fill="#1e2a32" font-size="12">session_id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#2980b9" font-weight="bold">FK → sessions</tspan></text>
    <text x="66" y="524" fill="#1e2a32" font-size="12">role  <tspan fill="#888">(text)</tspan>  <tspan fill="#666">learner | system</tspan></text>
    <text x="66" y="550" fill="#1e2a32" font-size="12">transcript  <tspan fill="#888">(text)</tspan></text>
    <text x="66" y="576" fill="#1e2a32" font-size="12">audio_path  <tspan fill="#888">(text)</tspan></text>
    <text x="66" y="602" fill="#1e2a32" font-size="12">verifier_log  <tspan fill="#888">(jsonb)</tspan>  <tspan fill="#7d6b4f" font-size="11">← 5 verdicts</tspan></text>
    <text x="66" y="628" fill="#1e2a32" font-size="12">created_at  <tspan fill="#888">(timestamptz)</tspan></text>
    <!-- outer border -->
    <rect x="50" y="420" width="310" height="216" rx="4" fill="none" stroke="#1e2a32" stroke-width="2"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- TABLE: gaps  (x=540, y=420)               -->
  <!-- ─────────────────────────────────────────── -->
  <g id="gaps">
    <rect x="540" y="420" width="310" height="34" rx="4" fill="#1e2a32"/>
    <text x="695" y="442" text-anchor="middle" fill="white" font-size="14" font-weight="bold">gaps</text>
    <!-- rows -->
    <rect x="540" y="454" width="310" height="130" fill="white" stroke="#1e2a32" stroke-width="1.5"/>
    <line x1="540" y1="480" x2="850" y2="480" stroke="#ddd" stroke-width="1"/>
    <line x1="540" y1="506" x2="850" y2="506" stroke="#ddd" stroke-width="1"/>
    <line x1="540" y1="532" x2="850" y2="532" stroke="#ddd" stroke-width="1"/>
    <line x1="540" y1="558" x2="850" y2="558" stroke="#ddd" stroke-width="1"/>
    <!-- content -->
    <text x="556" y="472" fill="#1e2a32" font-size="12">id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#c0392b" font-weight="bold">PK</tspan></text>
    <text x="556" y="498" fill="#1e2a32" font-size="12">session_id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#2980b9" font-weight="bold">FK → sessions</tspan></text>
    <text x="556" y="524" fill="#1e2a32" font-size="12">rung_name  <tspan fill="#888">(text)</tspan></text>
    <text x="556" y="550" fill="#1e2a32" font-size="12">seam_sentence  <tspan fill="#888">(text)</tspan></text>
    <!-- outer border -->
    <rect x="540" y="420" width="310" height="164" rx="4" fill="none" stroke="#1e2a32" stroke-width="2"/>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- TABLE: closes  (x=290, y=660)             -->
  <!-- ─────────────────────────────────────────── -->
  <g id="closes">
    <rect x="290" y="660" width="320" height="34" rx="4" fill="#1e2a32"/>
    <text x="450" y="682" text-anchor="middle" fill="white" font-size="14" font-weight="bold">closes</text>
    <!-- rows -->
    <rect x="290" y="694" width="320" height="130" fill="white" stroke="#1e2a32" stroke-width="1.5"/>
    <line x1="290" y1="720" x2="610" y2="720" stroke="#ddd" stroke-width="1"/>
    <line x1="290" y1="746" x2="610" y2="746" stroke="#ddd" stroke-width="1"/>
    <line x1="290" y1="772" x2="610" y2="772" stroke="#ddd" stroke-width="1"/>
    <line x1="290" y1="798" x2="610" y2="798" stroke="#ddd" stroke-width="1"/>
    <!-- content -->
    <text x="306" y="712" fill="#1e2a32" font-size="12">id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#c0392b" font-weight="bold">PK</tspan></text>
    <!-- LOAD-BEARING ROW highlighted -->
    <rect x="290" y="720" width="320" height="26" fill="#fff0f0"/>
    <text x="306" y="738" fill="#c0392b" font-size="12" font-weight="bold">gap_id  <tspan fill="#888">(uuid)</tspan>  <tspan fill="#c0392b">FK → gaps  ⭐</tspan></text>
    <text x="306" y="764" fill="#1e2a32" font-size="12">second_attempt_turn_id  <tspan fill="#2980b9" font-weight="bold">FK → turns</tspan></text>
    <text x="306" y="790" fill="#1e2a32" font-size="12">result  <tspan fill="#888">(text)</tspan>  <tspan fill="#666">real_close | fake_close</tspan></text>
    <text x="306" y="816" fill="#1e2a32" font-size="12">reason  <tspan fill="#888">(text)</tspan></text>
    <!-- outer border -->
    <rect x="290" y="660" width="320" height="164" rx="4" fill="none" stroke="#1e2a32" stroke-width="2.5"/>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ARROWS (Foreign Keys)                      -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- auth.users → sessions (user_id FK) -->
  <defs>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e2a32"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- auth.users → sessions -->
  <line x1="450" y1="84" x2="450" y2="148" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="458" y="120" fill="#2980b9" font-size="11">1 : N</text>

  <!-- sessions → turns -->
  <path d="M 350 340 L 205 418" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="240" y="388" fill="#2980b9" font-size="11">1 : N</text>

  <!-- sessions → gaps -->
  <path d="M 550 340 L 695 418" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="620" y="388" fill="#2980b9" font-size="11">1 : N</text>

  <!-- ⭐ THE LOAD-BEARING LINK: closes.gap_id → gaps -->
  <!-- Red bold arrow from closes up to gaps -->
  <path d="M 610 730 Q 730 690 695 586" stroke="#c0392b" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>

  <!-- closes.second_attempt_turn_id → turns -->
  <path d="M 290 760 Q 170 720 205 638" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LOAD-BEARING LINK callout label            -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="666" y="610" width="224" height="46" rx="6" fill="#c0392b"/>
  <text x="778" y="629" text-anchor="middle" fill="white" font-size="12" font-weight="bold">⭐ LOAD-BEARING LINK</text>
  <text x="778" y="648" text-anchor="middle" fill="white" font-size="11">evidence AND metric</text>
  <!-- pointer line from callout to arrow -->
  <line x1="720" y1="633" x2="698" y2="660" stroke="#c0392b" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RLS LEGEND                                 -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="20" width="200" height="100" rx="6" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="30" y="40" fill="#1e2a32" font-size="12" font-weight="bold">RLS Ownership Chain</text>
  <text x="30" y="60" fill="#555" font-size="11">sessions  → direct (user_id)</text>
  <text x="30" y="76" fill="#555" font-size="11">turns/gaps → 1-hop via sessions</text>
  <text x="30" y="92" fill="#555" font-size="11">closes    → 2-hop via gaps</text>
  <text x="30" y="110" fill="#c0392b" font-size="11" font-weight="bold">🔒 No cross-user reads</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TITLE                                      -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="450" y="804" text-anchor="middle" fill="#888" font-size="11">closes.gap_id → gaps.id  |  Without this FK you cannot prove the tool worked.</text>

</svg>
